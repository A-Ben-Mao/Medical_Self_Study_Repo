<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医学自学资料库</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.6/marked.min.js"></script>
<style>
  /* ===== Reset & Variables ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sidebar-w: 280px;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --bg: #ffffff;
    --bg-sidebar: #f1f5f9;
    --text: #1e293b;
    --text-muted: #64748b;
    --text-nav: #334155;
    --border: #e2e8f0;
    --code-bg: #f1f5f9;
    --blockquote-border: #2563eb;
    --table-stripe: #f8fafc;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .dark {
    --accent: #60a5fa;
    --accent-hover: #93bbfd;
    --bg: #0f172a;
    --bg-sidebar: #0b1121;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-nav: #cbd5e1;
    --border: #1e293b;
    --code-bg: #1e293b;
    --blockquote-border: #60a5fa;
    --table-stripe: #0f172a;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", Roboto, sans-serif;
    background: var(--bg-sidebar);
    color: var(--text);
    line-height: 1.7;
    font-size: 15px;
    display: flex;
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); text-decoration: underline; }

  /* ===== Sidebar ===== */
  #sidebar {
    position: fixed; top: 0; left: 0;
    width: var(--sidebar-w); height: 100vh;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 100;
    transition: transform .25s ease;
  }
  #sidebar-header {
    padding: 20px 18px 12px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h1 {
    font-size: 17px; font-weight: 700;
    color: var(--accent);
    letter-spacing: .5px;
  }
  #sidebar-header p {
    font-size: 12px; color: var(--text-muted);
    margin-top: 2px;
  }
  #search-box {
    margin: 12px 18px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  #search-box:focus { border-color: var(--accent); }
  #search-box::placeholder { color: var(--text-muted); }

  #nav-list {
    flex: 1; overflow-y: auto;
    padding: 4px 10px 20px;
    list-style: none;
  }
  #nav-list li { margin: 1px 0; }
  #nav-list a {
    display: flex; align-items: center;
    padding: 8px 12px;
    border-radius: 6px;
    color: var(--text-nav);
    font-size: 14px;
    transition: all .15s;
    text-decoration: none;
  }
  #nav-list a:hover {
    background: color-mix(in srgb, var(--accent) 10%, transparent);
    color: var(--accent);
    text-decoration: none;
  }
  #nav-list a.active {
    background: color-mix(in srgb, var(--accent) 14%, transparent);
    color: var(--accent);
    font-weight: 600;
  }
  #nav-list .nav-icon { margin-right: 8px; font-size: 16px; }

  #sidebar-footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  #theme-toggle {
    background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px;
    cursor: pointer; font-size: 14px;
    color: var(--text-muted);
    transition: all .15s;
  }
  #theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
  #sidebar-footer .gh-link {
    font-size: 13px; color: var(--text-muted);
    margin-left: auto;
  }

  /* ===== Content ===== */
  #content-wrap {
    margin-left: var(--sidebar-w);
    flex: 1; min-height: 100vh;
  }
  #content {
    max-width: 880px;
    margin: 0 auto;
    padding: 40px 48px 80px;
    background: var(--bg);
    min-height: 100vh;
  }

  /* ===== Markdown Rendered Styles ===== */
  #content h1, #content h2, #content h3, #content h4 {
    margin-top: 1.6em; margin-bottom: .6em;
    font-weight: 600; line-height: 1.35;
    color: var(--text);
  }
  #content h1 { font-size: 1.7em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  #content h2 { font-size: 1.35em; border-bottom: 1px solid var(--border); padding-bottom: .25em; }
  #content h3 { font-size: 1.15em; }
  #content h1:first-child { margin-top: 0; }
  #content p, #content li, #content blockquote { color: var(--text); }
  #content p { margin: .8em 0; }
  #content ul, #content ol { padding-left: 1.6em; margin: .6em 0; }
  #content li { margin: .25em 0; }
  #content blockquote {
    margin: 1em 0; padding: .6em 1em;
    border-left: 4px solid var(--blockquote-border);
    background: color-mix(in srgb, var(--blockquote-border) 6%, transparent);
    border-radius: 0 6px 6px 0;
  }
  #content blockquote p { margin: .3em 0; }
  #content code {
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: .88em;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
  }
  #content pre {
    margin: 1em 0;
    padding: 14px 16px;
    background: var(--code-bg);
    border-radius: 8px;
    overflow-x: auto;
    font-size: .88em;
    line-height: 1.5;
    border: 1px solid var(--border);
  }
  #content pre code { background: none; padding: 0; border-radius: 0; }
  #content table {
    width: 100%; border-collapse: collapse;
    margin: 1em 0;
    font-size: .93em;
  }
  #content th, #content td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
  }
  #content th { background: var(--bg-sidebar); font-weight: 600; }
  #content tr:nth-child(even) { background: var(--table-stripe); }
  #content img {
    max-width: 100%; height: auto;
    border-radius: 8px;
    margin: .8em 0;
  }
  #content hr {
    border: none; border-top: 1px solid var(--border);
    margin: 1.5em 0;
  }
  #content .heading-anchor {
    margin-left: -1.2em; padding-right: .3em;
    opacity: 0; transition: opacity .15s;
    color: var(--text-muted); font-weight: 400;
    text-decoration: none;
  }
  #content :hover > .heading-anchor { opacity: 1; }

  /* ===== States ===== */
  #loading { display: flex; align-items: center; justify-content: center; height: 300px; color: var(--text-muted); }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error { display: none; text-align: center; padding: 60px 20px; color: var(--text-muted); }
  #error .err-icon { font-size: 40px; margin-bottom: 12px; }

  /* ===== Mobile hamburger ===== */
  #menu-btn {
    display: none;
    position: fixed; top: 12px; left: 12px; z-index: 200;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    cursor: pointer; font-size: 20px; line-height: 1;
    box-shadow: var(--shadow);
    color: var(--text);
  }
  #sidebar-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 99;
    background: rgba(0,0,0,.4);
  }

  /* ===== Scrollbar ===== */
  #nav-list::-webkit-scrollbar { width: 4px; }
  #nav-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    #menu-btn { display: block; }
    #sidebar { transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay.open { display: block; }
    #content-wrap { margin-left: 0; }
    #content { padding: 24px 20px 60px; }
    #sidebar-header h1 { font-size: 16px; }
  }
</style>
</head>
<body>

<button id="menu-btn" aria-label="Toggle menu">☰</button>
<div id="sidebar-overlay"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>🧬 医学自学资料库</h1>
    <p>医学科研自学导航</p>
  </div>
  <input id="search-box" type="text" placeholder="搜索主题..." autocomplete="off">
  <ul id="nav-list"></ul>
  <div id="sidebar-footer">
    <button id="theme-toggle" title="切换暗色/亮色模式">🌙</button>
    <a class="gh-link" href="https://github.com/A-Ben-Mao/Medical_Self_Study_Repo" target="_blank" rel="noopener">GitHub ↗</a>
  </div>
</div>

<div id="content-wrap">
  <div id="content">
    <div id="loading"><div class="spinner"></div><span>加载中…</span></div>
    <div id="error"><div class="err-icon">⚠️</div><p>内容加载失败，请稍后重试</p></div>
  </div>
</div>

<script>
/* ===== Config ===== */
const REPO = { owner: 'A-Ben-Mao', name: 'Medical_Self_Study_Repo', branch: 'main' };
const RAW = `https://raw.githubusercontent.com/${REPO.owner}/${REPO.name}/${REPO.branch}`;

const NAV = [
  { id: 'home',    label: '首页',         icon: '🏠', file: 'README.md' },
  { id: 'rna',     label: '普通转录组学',  icon: '🧬', file: 'repo/Bulk_RNA-seq.md' },
  { id: 'radio',   label: '颅脑影像处理',  icon: '🫀', file: 'repo/Radiomics.md' },
  { id: 'cell',    label: '细胞实验基础',  icon: '🔬', file: 'repo/Cell_experiments.md' },
  { id: 'etho',    label: '常见动物行为学实验', icon: '🐭', file: 'repo/Ethology.md' },
  { id: 'data',    label: '常用实验数据处理',  icon: '📊', file: 'repo/Data_processing.md' },
];

let currentFile = 'README.md';
let currentId = 'home';

/* ===== DOM refs ===== */
const $ = s => document.querySelector(s);
const content = $('#content');
const loading = $('#loading');
const error = $('#error');
const navList = $('#nav-list');
const searchBox = $('#search-box');

/* ===== Initialize marked ===== */
marked.setOptions({
  gfm: true,
  breaks: false,
});

/* ===== Render markdown with image/link path rewriting ===== */
function renderMarkdown(text, filePath) {
  // Resolve base URL for relative paths
  const base = filePath ? RAW + '/' + filePath.replace(/\/[^/]+$/, '') : RAW;

  const renderer = new marked.Renderer();
  renderer.image = function({ href, title, text: alt }) {
    if (href && !href.startsWith('http') && !href.startsWith('#')) {
      href = base + '/' + href.replace(/^\.\//, '');
    }
    return `<img src="${href}" alt="${alt || ''}"${title ? ` title="${title}"` : ''} loading="lazy">`;
  };

  renderer.link = function({ href, title, text }) {
    // Internal .md link → let SPA handle it (intercepted via click)
    if (href && href.endsWith('.md') && !href.startsWith('http')) {
      const resolved = href.startsWith('/') ? RAW + href : base + '/' + href.replace(/^\.\//, '');
      return `<a href="${resolved}" data-md-link="true">${text}</a>`;
    }
    return `<a href="${href}"${title ? ` title="${title}"` : ''}${href && href.startsWith('http') ? ' target="_blank" rel="noopener"' : ''}>${text}</a>`;
  };

  renderer.heading = function({ tokens, depth, text }) {
    const id = text.toLowerCase().replace(/<[^>]+>/g, '').replace(/[^\w一-鿿]+/g, '-').replace(/(^-|-$)/g, '');
    const anchor = `<a class="heading-anchor" href="#${id}" aria-hidden="true">#</a>`;
    return `<h${depth} id="${id}">${anchor}${text}</h${depth}>`;
  };

  return marked.parse(text, { renderer });
}

/* ===== Fetch & render ===== */
async function loadPage(filePath, id) {
  currentFile = filePath || 'README.md';
  currentId = id || 'home';
  loading.style.display = 'flex';
  error.style.display = 'none';
  content.querySelector('#loading')?.style.setProperty('display', 'flex');
  // Remove previous rendered content (but keep loading & error children)
  Array.from(content.children).forEach(el => {
    if (el.id !== 'loading' && el.id !== 'error') el.remove();
  });

  // Update active nav
  navList.querySelectorAll('a').forEach(a => a.classList.remove('active'));
  const activeLink = navList.querySelector(`a[data-id="${currentId}"]`);
  if (activeLink) activeLink.classList.add('active');

  // Update URL hash
  history.replaceState(null, '', '#' + currentId);

  try {
    const url = filePath ? `${RAW}/${filePath}` : `${RAW}/README.md`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Not found');
    const md = await res.text();
    const html = renderMarkdown(md, filePath);

    loading.style.display = 'none';
    const div = document.createElement('div');
    div.innerHTML = html;
    content.appendChild(div);
  } catch (e) {
    loading.style.display = 'none';
    error.style.display = 'block';
  }

  // Close sidebar on mobile
  closeSidebar();
  window.scrollTo(0, 0);
}

/* ===== Handle internal .md link clicks ===== */
content.addEventListener('click', function(e) {
  const link = e.target.closest('a[data-md-link="true"]');
  if (!link) return;
  e.preventDefault();
  const href = link.getAttribute('href');
  // Extract relative path from raw URL
  const prefix = RAW + '/';
  if (href.startsWith(prefix)) {
    const relPath = href.slice(prefix.length);
    const navItem = NAV.find(n => n.file === relPath);
    if (navItem) {
      loadPage(relPath, navItem.id);
    } else {
      // Fallback: load unknown .md file
      try { loadPage(relPath, 'home'); } catch(_) { window.open(href, '_blank'); }
    }
  }
});

/* ===== Sidebar ===== */
function buildSidebar() {
  navList.innerHTML = '';
  NAV.forEach(item => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + item.id;
    a.setAttribute('data-id', item.id);
    a.innerHTML = `<span class="nav-icon">${item.icon}</span>${item.label}`;
    a.addEventListener('click', e => {
      e.preventDefault();
      loadPage(item.file, item.id);
    });
    li.appendChild(a);
    navList.appendChild(li);
  });
}

function filterSidebar(query) {
  const q = query.trim().toLowerCase();
  navList.querySelectorAll('li').forEach(li => {
    const text = li.textContent.toLowerCase();
    li.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
}

searchBox.addEventListener('input', e => filterSidebar(e.target.value));

/* ===== Theme ===== */
function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
    $('#theme-toggle').textContent = '☀️';
  }
}
$('#theme-toggle').addEventListener('click', () => {
  const isDark = document.documentElement.classList.toggle('dark');
  $('#theme-toggle').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
});

/* ===== Mobile sidebar ===== */
function openSidebar() {
  $('#sidebar').classList.add('open');
  $('#sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  $('#sidebar').classList.remove('open');
  $('#sidebar-overlay').classList.remove('open');
}
$('#menu-btn').addEventListener('click', openSidebar);
$('#sidebar-overlay').addEventListener('click', closeSidebar);

/* ===== Route from hash ===== */
function routeFromHash() {
  const hash = location.hash.slice(1);
  if (hash) {
    const match = NAV.find(n => n.id === hash);
    if (match) { loadPage(match.file, match.id); return; }
  }
  loadPage('README.md', 'home');
}

/* ===== Keyboard shortcuts ===== */
document.addEventListener('keydown', e => {
  // Ctrl+K or Cmd+K → focus search
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    searchBox.focus();
  }
  // Escape → blur search / close sidebar
  if (e.key === 'Escape') {
    searchBox.blur();
    closeSidebar();
  }
});

/* ===== Init ===== */
buildSidebar();
initTheme();
routeFromHash();
</script>
</body>
</html>
