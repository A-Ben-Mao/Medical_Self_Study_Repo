name: Sync Topic Dates to Web Page

on:
  push:
    branches: [main]
    paths:
      - 'repo/*.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update dates in docs/index.html
        run: node .github/scripts/sync-dates.js

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto sync topic updated dates"
          file_pattern: docs/index.html
