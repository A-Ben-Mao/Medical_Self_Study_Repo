name: Auto Update README Module Last Updated Time

on:
  push:
    branches:
      - main
      - master

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ⭐ 拉完整历史，避免 HEAD~1 问题

      - name: Update module last updated date in README
        run: |
          git pull --rebase origin main 2>/dev/null || true
          if [ ! -f README.md ]; then
            exit 0
          fi

          update_last_time() {
            MODULE="$1"
            FILE="$2"
            DATE=$(git log -1 --format=%cd --date=format:%Y-%m-%d -- "$FILE")
            if [ -n "$DATE" ]; then
              sed -i "s/^\(| ${MODULE} | [^|]* | [0-9\-]\+ | \).*\(|\)$/\1${DATE}\2/" README.md
            fi
          }

          update_last_time "转录组学分析"     "repo/Bulk_RNA-seq.md"
          update_last_time "颅脑影像处理"     "repo/Radiomics.md"
          update_last_time "细胞实验基础"     "repo/Cell_experiments.md"
          update_last_time "常见动物行为学实验" "repo/Ethology.md"
          update_last_time "常用实验数据处理"   "repo/Data_processing.md"

          TODAY=$(TZ=Asia/Shanghai date "+%Y-%m-%d")
          sed -i "s/后续将持续更新，最近一次更新时间为：.*/后续将持续更新，最近一次更新时间为：${TODAY}/" README.md

      - name: Commit and push if README changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No README changes."
            exit 0
          fi

          git add README.md
          git commit -m "docs: auto update module last updated date"
          git push
